<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Profile - Kashi Rivaz</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 20px;
        }

        .profile-header h1 {
            font-size: 32px;
            color: #333;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #ff5252;
        }

        .profile-section {
            background: white;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .profile-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-item label {
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .info-item p {
            color: #333;
            font-size: 16px;
        }

        .edit-btn,
        .save-btn,
        .cancel-btn {
            padding: 10px 20px;
            margin-right: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .edit-btn {
            background: #667eea;
            color: white;
        }

        .edit-btn:hover {
            background: #5568d3;
        }

        .save-btn {
            background: #388e3c;
            color: white;
        }

        .save-btn:hover {
            background: #2e7d32;
        }

        .cancel-btn {
            background: #999;
            color: white;
        }

        .cancel-btn:hover {
            background: #777;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .order-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .order-id {
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }

        .order-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-confirmed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-shipped {
            background: #e2e3e5;
            color: #383d41;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .order-details {
            color: #666;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .no-orders {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .edit-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
    </style>
</head>

<body>
    <section id="header">
        <a href="index.html"><img src="images/kashi rivaz.png" class="logo" alt="Kashi Rivaz"
                style="height:60px;width:auto;"></a>
        <nav>
            <ul id="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li>
                    <a class="cart-icon" href="cart.html" aria-label="Open cart">
                        Cart
                        <span id="cart-count" class="cart-badge">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </section>

    <div class="profile-container">
        <div class="profile-header">
            <h1>My Profile</h1>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <!-- STATISTICS -->
        <div class="stats-grid" id="stats-container">
            <div class="stat-card">
                <div class="stat-number" id="stat-orders">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-spent">₹0</div>
                <div class="stat-label">Total Spent</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="stat-member">Member</div>
                <div class="stat-label">Status</div>
            </div>
        </div>

        <!-- PROFILE INFORMATION -->
        <div class="profile-section">
            <h2>Personal Information</h2>
            <div id="profile-view">
                <div class="info-grid">
                    <div class="info-item">
                        <label>Email:</label>
                        <p id="email"></p>
                    </div>
                    <div class="info-item">
                        <label>First Name:</label>
                        <p id="firstName"></p>
                    </div>
                    <div class="info-item">
                        <label>Last Name:</label>
                        <p id="lastName"></p>
                    </div>
                    <div class="info-item">
                        <label>Phone:</label>
                        <p id="phone"></p>
                    </div>
                    <div class="info-item">
                        <label>Address:</label>
                        <p id="address"></p>
                    </div>
                    <div class="info-item">
                        <label>City:</label>
                        <p id="city"></p>
                    </div>
                    <div class="info-item">
                        <label>Postal Code:</label>
                        <p id="postal"></p>
                    </div>
                    <div class="info-item">
                        <label>Member Since:</label>
                        <p id="memberSince"></p>
                    </div>
                </div>
                <div style="margin-top: 20px;">
                    <button class="edit-btn" onclick="enableEditMode()">Edit Profile</button>
                </div>
            </div>

            <div id="profile-edit" style="display: none;">
                <form class="edit-form" onsubmit="saveProfile(event)">
                    <div class="form-group">
                        <label for="edit-fname">First Name:</label>
                        <input type="text" id="edit-fname" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-lname">Last Name:</label>
                        <input type="text" id="edit-lname" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-phone">Phone:</label>
                        <input type="tel" id="edit-phone" required>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="edit-address">Street / Full Address:</label>
                        <input type="text" id="edit-address" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-city">City:</label>
                        <input type="text" id="edit-city" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-postal">Postal Code:</label>
                        <input type="text" id="edit-postal" required>
                    </div>
                    <div style="grid-column: 1 / -1;">
                        <button type="submit" class="save-btn">Save Changes</button>
                        <button type="button" class="cancel-btn" onclick="cancelEditMode()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ORDER HISTORY -->
        <div class="profile-section">
            <h2>Order History</h2>
            <div id="orders-container">
                <div class="no-orders">No orders yet</div>
            </div>
        </div>
    </div>

    <script src="js/userData.js"></script>
    <script src="js/database.js"></script>
    <script src="js/script.js"></script>
    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', function () {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));

            if (!currentUser) {
                alert('Please login first');
                window.location.href = 'auth.html';
                return;
            }

            loadProfileData();
            loadOrderHistory();
            updateCartUI();
        });

        function loadProfileData() {
            const fullCustomer = customerDB.getCustomer(currentUser.id);

            if (!fullCustomer) {
                alert('Customer not found');
                return;
            }

            // Display user info
            document.getElementById('email').textContent = currentUser.email;
            document.getElementById('firstName').textContent = currentUser.firstName;
            document.getElementById('lastName').textContent = currentUser.lastName;
            document.getElementById('phone').textContent = currentUser.phone;
            document.getElementById('address').textContent = currentUser.address;
            document.getElementById('city').textContent = currentUser.city || '';
            document.getElementById('postal').textContent = currentUser.postalCode || '';

            const createdDate = new Date(fullCustomer.createdAt).toLocaleDateString();
            document.getElementById('memberSince').textContent = createdDate;

            // Display stats
            document.getElementById('stat-orders').textContent = fullCustomer.totalOrders;
            document.getElementById('stat-spent').textContent = '₹' + fullCustomer.totalSpent.toLocaleString();

            // Populate edit form
            document.getElementById('edit-fname').value = currentUser.firstName;
            document.getElementById('edit-lname').value = currentUser.lastName;
            document.getElementById('edit-phone').value = currentUser.phone;
            document.getElementById('edit-address').value = currentUser.address;
            document.getElementById('edit-city').value = currentUser.city || '';
            document.getElementById('edit-postal').value = currentUser.postalCode || '';
        }

        function loadOrderHistory() {
            const orders = customerDB.getCustomerOrders(currentUser.id);
            const container = document.getElementById('orders-container');

            if (orders.length === 0) {
                container.innerHTML = '<div class="no-orders">No orders yet. <a href="shop.html">Start shopping</a></div>';
                return;
            }

            let html = '';
            orders.forEach(order => {
                const date = new Date(order.createdAt).toLocaleDateString();
                const statusClass = 'status-' + order.status;

                html += `
                    <div class="order-item">
                        <div class="order-header">
                            <div class="order-id">${order.orderId}</div>
                            <span class="order-status ${statusClass}">${order.status.toUpperCase()}</span>
                        </div>
                        <div class="order-details">
                            <p><strong>Date:</strong> ${date}</p>
                            <p><strong>Items:</strong> ${order.items.length} product(s)</p>
                            <p><strong>Total:</strong> ₹${order.total.toLocaleString()}</p>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function enableEditMode() {
            document.getElementById('profile-view').style.display = 'none';
            document.getElementById('profile-edit').style.display = 'block';
        }

        function cancelEditMode() {
            document.getElementById('profile-view').style.display = 'block';
            document.getElementById('profile-edit').style.display = 'none';
        }

        function saveProfile(event) {
            event.preventDefault();

            const updatedData = {
                firstName: document.getElementById('edit-fname').value,
                lastName: document.getElementById('edit-lname').value,
                phone: document.getElementById('edit-phone').value,
                address: document.getElementById('edit-address').value,
                city: document.getElementById('edit-city').value,
                postalCode: document.getElementById('edit-postal').value
            };

            const result = customerDB.updateCustomer(currentUser.id, updatedData);

            if (result.success) {
                // Update current user in localStorage
                currentUser.firstName = updatedData.firstName;
                currentUser.lastName = updatedData.lastName;
                currentUser.phone = updatedData.phone;
                currentUser.address = updatedData.address;
                currentUser.city = updatedData.city;
                currentUser.postalCode = updatedData.postalCode;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));

                alert('Profile updated successfully!');
                cancelEditMode();
                loadProfileData();
            } else {
                alert('Error: ' + result.message);
            }
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                alert('Logged out successfully');
                window.location.href = 'index.html';
            }
        }
    </script>

    <!-- CMS Bar -->
    <script src="js/cms-bar.js"></script>
</body>

</html>
